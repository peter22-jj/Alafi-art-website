<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Alafi Art Work Website</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url('2.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: rgba(0, 0, 0, 0.5);
    }

    .logo { font-size: 1.5em; }

    nav ul { list-style: none; display: flex; gap: 20px; }

    nav a { color: white; text-decoration: none; font-weight: bold; }
    nav a.active { text-decoration: underline; }

    .gallery {
      text-align: center;
      padding: 100px 20px;
      background: rgba(0,0,0,0.4);
    }

    .gallery h2 { font-size: 2.5em; margin-bottom: 20px; text-shadow: 1px 1px 5px black; }

    /* Categories menu */
    .categories {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .category-box {
      background: rgba(255,255,255,0.2);
      padding: 20px 30px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.2em;
      transition: 0.3s;
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    .category-box:hover {
      background: rgba(255,255,255,0.5);
      color: black;
      transform: scale(1.05);
    }

    /* Gallery grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .gallery-grid img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      transition: transform 0.3s;
    }

    .gallery-grid img:hover { transform: scale(1.05); }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.5);
      position: relative;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

  <nav>
    <h1 class="logo">🎨 Alafi Art Work Website</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section class="gallery">
    <h2>Gallery Categories</h2>

    <!-- Categories -->
    <div class="categories">
      <a href="paintings.html" class="category-box">Paintings</a>
      <a href="sketches.html" class="category-box">Sketches</a>
      <a href="digital.html" class="category-box">Digital Art</a>
      <a href="sculptures.html" class="category-box">Sculptures</a>
      <a href="comics.html" class="category-box">comics</a>
      <a href="portraits.html" class="category-box">Portraits</a>
       <a href="graphics.html" class="category-box">graphics</a>
    </div>
  </section>

  <footer>
    © 2026 Alafi Art Work | All Rights Reserved
  </footer>

</body>
</html>
