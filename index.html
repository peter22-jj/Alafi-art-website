  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url('1.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
    }

    nav {
      display: flex;

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav a.active {
      text-decoration: underline;
    }

    .home {
      text-align: center;
      padding: 150px 20px;
      background: rgba(0, 0, 0, 0.4);

      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .home p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

      display: inline-block;
      background: #ffcc00;
      color: black;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.5);
      position: relative;
